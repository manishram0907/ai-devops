services:

  fastapi:
    build: ./app
    container_name: fastapi

    restart: unless-stopped

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16

    container_name: postgres

    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: redis

    restart: unless-stopped

  nginx:
    image: nginx:latest

    container_name: nginx

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - fastapi

volumes:
  postgres_data: